services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-scheduler-web
    command: python run.py
    env_file:
      - ${DOCKER_ENV_FILE:-.env}
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
    ports:
      - "5000:5000"
    restart: unless-stopped
    init: true
    volumes:
      - ./logs:/app/logs
      - ./logs_tareas:/app/logs_tareas
      - ./logs_sistema:/app/logs_sistema
      - ./scripts:/app/scripts
      - ./env_scripts:/app/env_scripts

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-scheduler-worker
    command: python scheduler_worker.py
    env_file:
      - ${DOCKER_ENV_FILE:-.env}
    restart: unless-stopped
    init: true
    volumes:
      - ./logs:/app/logs
      - ./logs_tareas:/app/logs_tareas
      - ./logs_sistema:/app/logs_sistema
      - ./scripts:/app/scripts
      - ./env_scripts:/app/env_scripts
